<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torneo Roberto Poma 2026 — IT F.C</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --it-primary: #00c853;
    --it-dark: #00952e;
    --it-light: #69f0ae;
    --bg: #0a0d0a;
    --surface: #111a11;
    --surface2: #162116;
    --border: #1e3020;
    --text: #e8f5e9;
    --text-muted: #7ca87f;
    --gold: #ffd600;
    --red: #ff3d3d;
    --draw: #64b5f6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── HERO ── */
  .hero {
    background: linear-gradient(135deg, #071007 0%, #0d1f0d 40%, #0a1a0a 100%);
    border-bottom: 1px solid var(--border);
    padding: 32px 24px 24px;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '⚽';
    font-size: 320px;
    position: absolute;
    right: -60px; top: -60px;
    opacity: 0.03;
    line-height: 1;
  }
  .hero-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(28px, 5vw, 52px);
    letter-spacing: 3px;
    color: var(--it-primary);
    line-height: 1;
  }
  .hero-sub {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(13px, 2vw, 17px);
    letter-spacing: 4px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-top: 4px;
  }
  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--it-primary);
    color: #000;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 2px;
    padding: 5px 14px;
    border-radius: 4px;
    margin-top: 14px;
  }

  /* ── LAYOUT ── */
  .layout {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 0;
    max-width: 1300px;
    margin: 0 auto;
    padding: 0 0 60px;
  }
  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { order: -1; }
  }

  .main-col { padding: 24px 20px 0 24px; }
  .sidebar { padding: 24px 24px 0 12px; }

  /* ── SECTION TITLES ── */
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    color: var(--it-primary);
    border-left: 4px solid var(--it-primary);
    padding-left: 12px;
    margin-bottom: 16px;
  }

  /* ── IT FC SPOTLIGHT ── */
  .it-spotlight {
    background: linear-gradient(135deg, #0d2010, #071507);
    border: 1px solid var(--it-primary);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
  }
  .it-spotlight::after {
    content: 'IT';
    font-family: 'Bebas Neue', sans-serif;
    font-size: 180px;
    position: absolute;
    right: -10px; bottom: -30px;
    color: var(--it-primary);
    opacity: 0.05;
    line-height: 1;
    pointer-events: none;
  }
  .it-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38px;
    letter-spacing: 4px;
    color: var(--it-primary);
  }
  .it-stats-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 12px;
  }
  .it-stat {
    background: rgba(0,200,83,0.08);
    border: 1px solid rgba(0,200,83,0.2);
    border-radius: 6px;
    padding: 10px 16px;
    text-align: center;
    min-width: 72px;
  }
  .it-stat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    color: var(--it-light);
    line-height: 1;
  }
  .it-stat-lbl {
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .it-next {
    margin-top: 16px;
    background: rgba(0,0,0,0.3);
    border-radius: 6px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .it-next-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--text-muted);
    text-transform: uppercase;
  }
  .it-next-match {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 17px;
    color: var(--it-primary);
  }
  .it-next-date {
    font-size: 12px;
    color: var(--text-muted);
  }

  /* ── FECHAS ── */
  .fecha-block {
    margin-bottom: 24px;
  }
  .fecha-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
    cursor: pointer;
    user-select: none;
  }
  .fecha-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    color: var(--text-muted);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 3px 12px;
    border-radius: 4px;
    min-width: 90px;
    text-align: center;
  }
  .fecha-date {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 1px;
  }
  .fecha-toggle {
    margin-left: auto;
    color: var(--text-muted);
    font-size: 18px;
    transition: transform .2s;
  }
  .fecha-block.collapsed .fecha-toggle { transform: rotate(-90deg); }
  .fecha-matches { display: flex; flex-direction: column; gap: 6px; }
  .fecha-block.collapsed .fecha-matches { display: none; }

  /* ── MATCH CARD ── */
  .match-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 0;
    padding: 10px 14px;
    transition: border-color .2s;
  }
  .match-card:hover { border-color: #2d4030; }
  .match-card.it-match {
    border-color: var(--it-dark);
    background: linear-gradient(135deg, #0e1e0e, #0a1a0a);
    box-shadow: 0 0 0 1px rgba(0,200,83,0.15);
  }
  .match-card.it-match:hover { border-color: var(--it-primary); }

  .team-side {
    display: flex;
    flex-direction: column;
  }
  .team-side.right { align-items: flex-end; }

  .team-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.5px;
  }
  .team-name.it-team { color: var(--it-primary); }
  .match-time {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 1px;
  }

  .score-section {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 14px;
  }
  .score-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    position: relative;
  }
  .score-box:hover { border-color: var(--it-primary); background: rgba(0,200,83,0.06); }
  .score-box input {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    background: transparent;
    border: none;
    outline: none;
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--text);
    cursor: pointer;
  }
  .score-box input:focus { color: var(--it-primary); }
  .score-sep { color: var(--text-muted); font-size: 12px; }

  .result-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 5px;
    vertical-align: middle;
  }
  .result-dot.W { background: var(--it-primary); }
  .result-dot.D { background: var(--draw); }
  .result-dot.L { background: var(--red); }

  /* ── STANDINGS ── */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 24px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    background: var(--surface2);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    text-transform: uppercase;
    padding: 10px 8px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  thead th:first-child { text-align: left; padding-left: 14px; }
  tbody tr {
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background .15s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,0.02); }
  tbody tr.it-row {
    background: rgba(0,200,83,0.07);
  }
  tbody tr.it-row:hover { background: rgba(0,200,83,0.12); }
  td {
    padding: 9px 8px;
    text-align: center;
    color: var(--text);
  }
  td:first-child {
    text-align: left;
    padding-left: 14px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 14px;
  }
  .pos-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px;
    color: var(--text-muted);
    min-width: 22px;
    display: inline-block;
    text-align: center;
  }
  .pos-num.top { color: var(--gold); }
  .pts-cell {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    color: var(--it-primary);
  }
  .it-row .pts-cell { color: var(--gold); }
  td.it-team-name { color: var(--it-primary); }

  /* ── NEXT MATCHES (sidebar) ── */
  .next-list { display: flex; flex-direction: column; gap: 8px; }
  .next-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
  }
  .next-item.it-next-item { border-color: rgba(0,200,83,0.4); background: #0d1e0d; }
  .next-fecha { font-size: 10px; color: var(--text-muted); letter-spacing: 1px; margin-bottom: 4px; }
  .next-teams {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 15px;
  }
  .next-d { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  /* ── SAVE NOTICE ── */
  .save-notice {
    position: fixed;
    bottom: 20px; right: 20px;
    background: var(--it-primary);
    color: #000;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 14px;
    padding: 10px 20px;
    border-radius: 6px;
    display: none;
    box-shadow: 0 4px 20px rgba(0,200,83,0.4);
    z-index: 1000;
  }
  .save-notice.show { display: block; animation: fadeInUp .3s; }
  @keyframes fadeInUp {
    from { opacity:0; transform: translateY(12px); }
    to { opacity:1; transform: translateY(0); }
  }

  .chip {
    display: inline-block;
    font-size: 10px;
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 1px;
    padding: 2px 7px;
    border-radius: 3px;
    background: rgba(0,200,83,0.15);
    color: var(--it-primary);
    margin-left: 6px;
    vertical-align: middle;
  }
</style>
</head>

// Load saved scores
function loadScores() {
  try { return JSON.parse(localStorage.getItem('poma2026_scores') || '{}'); } catch(e) { return {}; }
}
function saveScores(scores) {
  localStorage.setItem('poma2026_scores', JSON.stringify(scores));
}

let scores = loadScores();

function scoreKey(f, m) { return `f${f}_m${m}`; }

function getStandings() {
  const st = {};
  TEAMS.forEach(t => { st[t] = {pj:0,pg:0,pe:0,pp:0,gf:0,gc:0,pts:0}; });
  FECHAS.forEach(fecha => {
    fecha.matches.forEach((match, mi) => {
      const k = scoreKey(fecha.num, mi);
      const sc = scores[k];
      if (sc && sc.g1 !== '' && sc.g2 !== '') {
        const g1 = parseInt(sc.g1), g2 = parseInt(sc.g2);
        if (isNaN(g1) || isNaN(g2)) return;
        const e1 = match.e1, e2 = match.e2;
        if (!st[e1]) st[e1] = {pj:0,pg:0,pe:0,pp:0,gf:0,gc:0,pts:0};
        if (!st[e2]) st[e2] = {pj:0,pg:0,pe:0,pp:0,gf:0,gc:0,pts:0};
        st[e1].pj++; st[e2].pj++;
        st[e1].gf += g1; st[e1].gc += g2;
        st[e2].gf += g2; st[e2].gc += g1;
        if (g1 > g2) { st[e1].pg++; st[e1].pts+=3; st[e2].pp++; }
        else if (g1 < g2) { st[e2].pg++; st[e2].pts+=3; st[e1].pp++; }
        else { st[e1].pe++; st[e1].pts+=1; st[e2].pe++; st[e2].pts+=1; }
      }
    });
  });
  return st;
}

function renderStandings() {
  const st = getStandings();
  const sorted = TEAMS.slice().sort((a,b) => {
    const sa = st[a]||{pts:0,gf:0,gc:0}, sb = st[b]||{pts:0,gf:0,gc:0};
    if (sb.pts !== sa.pts) return sb.pts - sa.pts;
    const da = sa.gf - sa.gc, db = sb.gf - sb.gc;
    if (db !== da) return db - da;
    return sb.gf - sa.gf;
  });
  const tbody = document.getElementById('standings-body');
  tbody.innerHTML = '';
  sorted.forEach((team, i) => {
    const s = st[team]||{pj:0,pg:0,pe:0,pp:0,gf:0,gc:0,pts:0};
    const dif = s.gf - s.gc;
    const isIT = team === 'IT F.C';
    const pos = i+1;
    const posClass = pos <= 8 ? 'top' : '';
    tbody.innerHTML += `
      <tr class="${isIT?'it-row':''}">
        <td><span class="pos-num ${posClass}">${pos}</span></td>
        <td class="${isIT?'it-team-name':''}">${team}</td>
        <td>${s.pj}</td>
        <td>${s.pg}</td>
        <td>${s.pe}</td>
        <td>${s.pp}</td>
        <td>${s.gf}</td>
        <td>${s.gc}</td>
        <td style="color:${dif>0?'var(--it-primary)':dif<0?'var(--red)':'var(--text-muted)'}">${dif>0?'+':''}${dif}</td>
        <td class="pts-cell">${s.pts}</td>
      </tr>`;
  });
}

function updateITSpotlight() {
  const st = getStandings();
  const s = st['IT F.C']||{pj:0,pg:0,pe:0,pp:0,gf:0,gc:0,pts:0};
  document.getElementById('stat-pj').textContent = s.pj;
  document.getElementById('stat-pg').textContent = s.pg;
  document.getElementById('stat-pe').textContent = s.pe;
  document.getElementById('stat-pp').textContent = s.pp;
  document.getElementById('stat-gf').textContent = s.gf;
  document.getElementById('stat-gc').textContent = s.gc;
  document.getElementById('stat-pts').textContent = s.pts;
  // Find next IT match
  let nextMatch = null, nextFecha = null, nextDate = null;
  for (const fecha of FECHAS) {
    for (let mi=0; mi<fecha.matches.length; mi++) {
      const m = fecha.matches[mi];
      if (m.e1==='IT F.C' || m.e2==='IT F.C') {
        const k = scoreKey(fecha.num, mi);
        const sc = scores[k];
        if (!sc || sc.g1==='' || sc.g2==='') {
          nextMatch = m; nextFecha = fecha.num; nextDate = fecha.dates[mi]; break;
        }
      }
    }
    if (nextMatch) break;
  }
  if (nextMatch) {
    document.getElementById('itNextMatch').textContent = `${nextMatch.e1} vs ${nextMatch.e2}`;
    document.getElementById('itNextDate').textContent = `📅 ${nextDate} · 7:00 PM · Fecha ${nextFecha}`;
  } else {
    document.getElementById('itNextMatch').textContent = 'Temporada finalizada';
    document.getElementById('itNextDate').textContent = '🏆 Todos los partidos jugados';
  }
}

function renderITMatchList() {
  const container = document.getElementById('itMatchList');
  container.innerHTML = '';
  FECHAS.forEach(fecha => {
    fecha.matches.forEach((m, mi) => {
      if (m.e1 === 'IT F.C' || m.e2 === 'IT F.C') {
        const k = scoreKey(fecha.num, mi);
        const sc = scores[k];
        let resultHtml = '';
        let resultClass = '';
        if (sc && sc.g1 !== '' && sc.g2 !== '') {
          const g1=parseInt(sc.g1), g2=parseInt(sc.g2);
          const itIsE1 = m.e1 === 'IT F.C';
          const itG = itIsE1 ? g1 : g2, rivG = itIsE1 ? g2 : g1;
          const res = itG > rivG ? 'W' : itG < rivG ? 'L' : 'D';
          const resLabel = res==='W'?'Victoria':res==='D'?'Empate':'Derrota';
          const resColor = res==='W'?'var(--it-primary)':res==='D'?'var(--draw)':'var(--red)';
          resultHtml = `<span style="color:${resColor};font-size:11px;font-weight:700">${g1} - ${g2} · ${resLabel}</span>`;
          resultClass = 'it-next-item';
        } else {
          resultClass = 'it-next-item';
          resultHtml = `<span style="color:var(--text-muted);font-size:11px">Pendiente</span>`;
        }
        container.innerHTML += `
          <div class="next-item ${resultClass}">
            <div class="next-fecha">FECHA ${fecha.num}</div>
            <div class="next-teams">${m.e1 === 'IT F.C' ? `<span style="color:var(--it-primary)">IT F.C</span> vs ${m.e2}` : `${m.e1} vs <span style="color:var(--it-primary)">IT F.C</span>`}</div>
            <div class="next-d">📅 ${fecha.dates[mi]} · ${resultHtml}</div>
          </div>`;
      }
    });
  });
}

function showSaveNotice() {
  const n = document.getElementById('saveNotice');
  n.classList.add('show');
  setTimeout(() => n.classList.remove('show'), 1800);
}

function getResultClass(team, g1, g2, isE1) {
  if (g1==='' || g2==='') return '';
  const n1=parseInt(g1), n2=parseInt(g2);
  if (isNaN(n1)||isNaN(n2)) return '';
  const myG = isE1 ? n1 : n2, rivG = isE1 ? n2 : n1;
  if (team === 'IT F.C') {
    if (myG > rivG) return '<span class="result-dot W"></span>';
    if (myG < rivG) return '<span class="result-dot L"></span>';
    return '<span class="result-dot D"></span>';
  }
  return '';
}

function renderFechas() {
  const container = document.getElementById('fechas-container');
  container.innerHTML = '';
  FECHAS.forEach(fecha => {
    const block = document.createElement('div');
    block.className = 'fecha-block';
    block.id = `fecha-${fecha.num}`;
    const hasIT = fecha.matches.some(m => m.e1==='IT F.C'||m.e2==='IT F.C');
    let matchesHtml = '';
    fecha.matches.forEach((m, mi) => {
      const isIT = m.e1 === 'IT F.C' || m.e2 === 'IT F.C';
      const k = scoreKey(fecha.num, mi);
      const sc = scores[k] || {g1:'',g2:''};
      const itClass = isIT ? 'it-match' : '';
      const e1Class = m.e1==='IT F.C' ? 'it-team' : '';
      const e2Class = m.e2==='IT F.C' ? 'it-team' : '';
      const chip = isIT ? '<span class="chip">NUESTRO PARTIDO</span>' : '';
      matchesHtml += `
        <div class="match-card ${itClass}" data-key="${k}">
          <div class="team-side">
            <span class="team-name ${e1Class}">${m.e1}${chip&&m.e1==='IT F.C'?chip:''}</span>
            <span class="match-time">📅 ${fecha.dates[mi]} · 7:00 PM</span>
          </div>
          <div class="score-section">
            <div class="score-box"><input type="number" min="0" max="99" value="${sc.g1}" placeholder="—" data-key="${k}" data-which="g1" title="Goles ${m.e1}"></div>
            <span class="score-sep">–</span>
            <div class="score-box"><input type="number" min="0" max="99" value="${sc.g2}" placeholder="—" data-key="${k}" data-which="g2" title="Goles ${m.e2}"></div>
          </div>
          <div class="team-side right">
            <span class="team-name ${e2Class}">${m.e2==='IT F.C'&&chip?chip:''}${m.e2}</span>
            <span class="match-time" style="text-align:right">&nbsp;</span>
          </div>
        </div>`;
    });
    const firstDate = fecha.dates[0];
    const lastDate = fecha.dates[fecha.dates.length-1];
    const dateRange = firstDate === lastDate ? firstDate : `${firstDate} — ${lastDate}`;
    block.innerHTML = `
      <div class="fecha-header" onclick="toggleFecha(${fecha.num})">
        <div class="fecha-num">FECHA ${fecha.num}</div>
        <div class="fecha-date">${dateRange}${hasIT?'<span class="chip">IT F.C</span>':''}</div>
        <div class="fecha-toggle">▾</div>
      </div>
      <div class="fecha-matches">${matchesHtml}</div>`;
    container.appendChild(block);
  });

  // Score input events
  document.querySelectorAll('.fecha-matches input').forEach(inp => {
    inp.addEventListener('change', function() {
      const k = this.dataset.key, which = this.dataset.which;
      if (!scores[k]) scores[k] = {g1:'',g2:''};
      scores[k][which] = this.value;
      saveScores(scores);
      renderStandings();
      renderITMatchList();
      updateITSpotlight();
      showSaveNotice();
    });
  });
}

function toggleFecha(num) {
  const block = document.getElementById(`fecha-${num}`);
  block.classList.toggle('collapsed');
}

// Initial render
renderFechas();
renderStandings();
renderITMatchList();
updateITSpotlight();
</script>
